name: opencode-review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  detect-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      run_kind: ${{ steps.check.outputs.run_kind }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      issue_number: ${{ steps.check.outputs.issue_number }}
    steps:
      - id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT_NAME: ${{ github.event_name }}
          IS_PR: ${{ github.event.issue.pull_request != '' || github.event.pull_request != '' }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "run_kind=auto_pr_review" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "issue_comment" ] || [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            if echo "$COMMENT_BODY" | grep -qE '(^|[[:space:]])/(oc|opencode)\b'; then
              if [ "$IS_PR" = "true" ]; then
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                echo "run_kind=manual_pr_review" >> "$GITHUB_OUTPUT"
                echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
                echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
              else
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                echo "run_kind=issue_task" >> "$GITHUB_OUTPUT"
                echo "pr_number=" >> "$GITHUB_OUTPUT"
                echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "run_kind=none" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "run_kind=none" >> "$GITHUB_OUTPUT"
          fi

  opencode:
    needs: detect-trigger
    if: needs.detect-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout PR branch
        if: needs.detect-trigger.outputs.run_kind == 'auto_pr_review' || needs.detect-trigger.outputs.run_kind == 'manual_pr_review'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.detect-trigger.outputs.pr_number }}
        run: |
          gh pr checkout "$PR_NUMBER"
          echo ".opencode/" >> .gitignore
          echo "opencode.json" >> .gitignore

      - name: Prepare issue execution branch
        if: needs.detect-trigger.outputs.run_kind == 'issue_task'
        env:
          ISSUE_NUMBER: ${{ needs.detect-trigger.outputs.issue_number }}
        run: |
          BRANCH_NAME="opencode/issue-$ISSUE_NUMBER"
          git checkout -b "$BRANCH_NAME"
          echo ".opencode/" >> .gitignore
          echo "opencode.json" >> .gitignore

      - name: Bot Details
        id: bot-details
        uses: raven-actions/bot-details@v1

      - name: Setup credentials
        run: |
          git config --global user.name "${{ steps.bot-details.outputs.name }}"
          git config --global user.email "${{ steps.bot-details.outputs.email }}"
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf https://github.com/

      - name: Acknowledge request
        if: needs.detect-trigger.outputs.run_kind == 'manual_pr_review'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.detect-trigger.outputs.pr_number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "🤖 Review in progress. [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --repo "${{ github.repository }}"

      - name: Acknowledge issue request
        if: needs.detect-trigger.outputs.run_kind == 'issue_task'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.detect-trigger.outputs.issue_number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "🤖 Task in progress. [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --repo "${{ github.repository }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Run static analysis
        run: bash .github/scripts/static-analysis.sh
        continue-on-error: true

      - name: Ensure analysis artifact exists
        if: needs.detect-trigger.outputs.run_kind != 'issue_task'
        run: |
          mkdir -p .opencode
          if [ ! -f .opencode/analysis.txt ]; then
            echo "# Static analysis summary" > .opencode/analysis.txt
            echo "" >> .opencode/analysis.txt
            echo "Static analysis was not available for this review." >> .opencode/analysis.txt
            echo "The reviewer should perform manual code inspection." >> .opencode/analysis.txt
          fi

      - name: Verify Qdrant connectivity
        run: |
          echo "Waiting for Qdrant..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/readyz > /dev/null 2>&1; then
              echo "Qdrant ready."
              exit 0
            fi
            sleep 1
          done
          echo "::warning::Qdrant did not become ready in time"
          exit 1
        continue-on-error: true

      - name: Run OpenCode Review
        uses: anomalyco/opencode/github@latest
        env:
          LIGHTBRIDGE_API_KEY: ${{ secrets.LIGHTBRIDGE_API_KEY }}
          LIGHTBRIDGE_BASE_URL: ${{ vars.LIGHTBRIDGE_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ needs.detect-trigger.outputs.run_kind == 'manual_pr_review' && 'lightbridge/kimi-k2.5' || needs.detect-trigger.outputs.run_kind == 'issue_task' && 'lightbridge/kimi-k2.5' || 'lightbridge/gemini-3.1-flash-lite' }}
          agent: ${{ needs.detect-trigger.outputs.run_kind == 'issue_task' && 'moa-orchestrator' || needs.detect-trigger.outputs.run_kind == 'manual_pr_review' && 'manual-review' || 'auto-review' }}
          use_github_token: true
          prompt: |
            If this run was triggered from a pull request, review the pull request following the instructions in your prompt file.

            Pull request review steps:
            1. Read `.opencode/analysis.txt` for static analysis findings.
            2. Read `.opencode/review-rules.md` for repository conventions.
            3. Read `AGENTS.md` for architecture standards.
            4. If `code_search` MCP is available:
               - Use `qdrant-store` to store code snippets with descriptions.
               - Use `qdrant-find` to search for related code patterns.
            5. Check all rejection criteria systematically.
            6. Provide verdict: REQUEST CHANGES or APPROVE.

            If this run was triggered from an issue comment:
            1. Read the issue body and the full issue discussion before acting.
            2. Infer the requested outcome from the issue plus the `/oc` or `/opencode` comment.
            3. If the request is to implement, fix, refactor, or otherwise change the codebase, execute it end-to-end using `moa-orchestrator`.
            4. Make the change on the issue branch checked out in this workflow.
            5. Commit the changes and open or update a pull request linked to the issue.
            6. If the request is explanation, triage, or analysis only, respond accordingly without forcing code changes.
            7. Keep the response factual and action-oriented.

      - name: Report failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.detect-trigger.outputs.pr_number }}
          ISSUE_NUMBER: ${{ needs.detect-trigger.outputs.issue_number }}
          RUN_KIND: ${{ needs.detect-trigger.outputs.run_kind }}
        run: |
          if [ "$RUN_KIND" = "issue_task" ]; then
            gh issue comment "$ISSUE_NUMBER" \
              --body "🤖 Task failed. [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
              --repo "${{ github.repository }}"
          else
            gh pr comment "$PR_NUMBER" \
              --body "🤖 Review failed. [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
              --repo "${{ github.repository }}"
          fi
